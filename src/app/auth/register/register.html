<main class="flex min-h-screen bg-white font-body text-on-surface antialiased overflow-hidden">

  <section class="hidden lg:flex lg:w-1/2 relative flex-col justify-between p-16 overflow-hidden">
    <div class="absolute inset-0 z-0">
      <img src="oficinaFondo.png" class="w-full h-full object-cover" alt="Fondo profesional">
      <div class="absolute inset-0 bg-overlay-deep"></div>
    </div>

    <div class="relative z-10">
      <h1 class="text-3xl font-extrabold tracking-tight text-white/90 font-headline">Yachay-Pro</h1>
    </div>

    <div class="relative z-10 flex flex-col items-start justify-center flex-grow -translate-y-10">
      <h2 class="text-[64px] font-extrabold text-white leading-[1.05] tracking-tight mb-4 font-headline">
        Elevando el<br>análisis<br>profesional
      </h2>
      <div class="w-20 h-1.5 bg-secondary rounded-full"></div>
    </div>

    <div class="relative z-10">
      <p class="text-[11px] uppercase tracking-[0.25em] text-white/70 font-body">
        FORJANDO ANALISTAS, BLINDANDO EL FUTURO DE YACHAYTECH
      </p>
    </div>
  </section>

  <section class="w-full lg:w-1/2 flex flex-col bg-white overflow-y-auto">

    <div class="flex-grow flex flex-col items-center justify-center px-8 md:px-16 py-12">

      <div class="w-full max-w-[440px] animate-fade-in">

        <div class="mb-10 text-left">
          <h3 class="text-3xl font-bold text-primary mb-2 font-headline">Iniciar Sesión en Yachay-<p></p>Pro</h3>
          <p class="text-on-surface-variant font-body text-sm">Ingrese sus credenciales para registrarse.</p>
        </div>

        <form class="space-y-5" (ngSubmit)="registrarUsuario()">

          <div class="space-y-2">
            <label
              class="block font-label text-[11px] font-semibold uppercase tracking-widest text-on-surface-variant">NOMBRES</label>
            <input name="nombres" [(ngModel)]="nuevoUsuario.nombres"
              class="w-full bg-white border border-outline-variant/40 focus:border-secondary focus:ring-1 focus:ring-secondary rounded-lg py-3.5 px-4 outline-none transition-all font-body placeholder:text-outline-variant/50"
              placeholder="Franco" type="text" required>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
              <label
                class="block font-label text-[11px] font-semibold uppercase tracking-widest text-on-surface-variant">APELLIDO
                PATERNO</label>
              <input name="apepa" [(ngModel)]="nuevoUsuario.apepa"
                class="w-full bg-white border border-outline-variant/40 focus:border-secondary focus:ring-1 focus:ring-secondary rounded-lg py-3.5 px-4 outline-none transition-all font-body placeholder:text-outline-variant/50"
                placeholder="Lopez" type="text" required>
            </div>
            <div class="space-y-2">
              <label
                class="block font-label text-[11px] font-semibold uppercase tracking-widest text-on-surface-variant">APELLIDO
                MATERNO</label>
              <input name="apema" [(ngModel)]="nuevoUsuario.apema"
                class="w-full bg-white border border-outline-variant/40 focus:border-secondary focus:ring-1 focus:ring-secondary rounded-lg py-3.5 px-4 outline-none transition-all font-body placeholder:text-outline-variant/50"
                placeholder="Moreno" type="text" required>
            </div>
          </div>

          <div class="space-y-2">
            <label
              class="block font-label text-[11px] font-semibold uppercase tracking-widest text-on-surface-variant">CORREO
              CORPORATIVO</label>
            <input name="correo" [(ngModel)]="nuevoUsuario.correo"
              class="w-full bg-white border border-outline-variant/40 focus:border-secondary focus:ring-1 focus:ring-secondary rounded-lg py-3.5 px-4 outline-none transition-all font-body placeholder:text-outline-variant/50"
              placeholder="example@gmail.com" type="email" required>
          </div>

          <div class="space-y-2">
            <label
              class="block font-label text-[11px] font-semibold uppercase tracking-widest text-on-surface-variant">CONTRASEÑA</label>
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline/60 group-focus-within:text-secondary transition-colors text-[20px]">lock</span>
              <input name="contrasena" [(ngModel)]="nuevoUsuario.contrasena"
                class="w-full bg-white border border-outline-variant/40 focus:border-secondary focus:ring-1 focus:ring-secondary rounded-lg py-3.5 pl-12 pr-4 outline-none transition-all font-body placeholder:text-outline-variant/50"
                placeholder="••••••••" type="password" required>
            </div>
          </div>

          <div class="space-y-2">
            <label
              class="block font-label text-[11px] font-semibold uppercase tracking-widest text-on-surface-variant">CONFIRMAR
              CONTRASEÑA</label>
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline/60 group-focus-within:text-secondary transition-colors text-[20px]">lock</span>
              <input name="confirmar"
                class="w-full bg-white border border-outline-variant/40 focus:border-secondary focus:ring-1 focus:ring-secondary rounded-lg py-3.5 pl-12 pr-4 outline-none transition-all font-body placeholder:text-outline-variant/50"
                placeholder="••••••••" type="password">
            </div>
          </div>

          <button
            class="w-full bg-[#001c3a] text-white font-headline font-bold py-4 rounded-lg hover:opacity-95 active:scale-[0.98] transition-all shadow-lg mt-4"
            type="submit">
            Registrarse
          </button>

          <div class="text-center pt-4">
            <p class="text-on-surface-variant text-sm font-medium font-body">
              ¿Ya tienes una cuenta?
              <a routerLink="/login"
                class="text-secondary font-bold hover:underline underline-offset-4 cursor-pointer">Ingresar ahora</a>
            </p>
          </div>
        </form>
      </div>
    </div>

    <footer class="p-8 flex justify-center space-x-8 mt-auto">
      <a class="text-[10px] font-label font-bold uppercase tracking-widest text-on-surface-variant hover:text-secondary transition-colors"
        href="#">PRIVACY POLICY</a>
      <a class="text-[10px] font-label font-bold uppercase tracking-widest text-on-surface-variant hover:text-secondary transition-colors"
        href="#">TERMS OF SERVICE</a>
    </footer>
  </section>
</main>
