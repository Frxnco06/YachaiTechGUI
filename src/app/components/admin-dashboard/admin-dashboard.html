<div class="p-8 bg-[#F7F7F9] min-h-screen">
  <div class="max-w-4xl mx-auto">
    <h2 class="text-2xl font-black text-slate-900 mb-6">Gestión de Usuarios</h2>
    
    <div class="bg-white rounded-[2rem] border border-slate-200 shadow-xl overflow-hidden">
      <table class="w-full text-left">
        <thead class="bg-slate-50">
          <tr>
            <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-slate-500">Correo Electrónico</th>
            <th class="px-6 py-4 text-[10px] font-bold uppercase tracking-widest text-slate-500">Rol Asignado</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
          <tr *ngFor="let user of usuarios" class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4 text-sm font-medium text-slate-700">{{ user.email }}</td>
            <td class="px-6 py-4">
              <span [class]="'px-3 py-1 rounded-full text-[10px] font-black ' + getRoleClass(user.rol)">
                {{ user.rol }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
