<div class="min-h-screen bg-[#F7F7F9] font-sans pb-20">
  <!-- Header inspirado en YachayPro[cite: 1] -->
  <header class="bg-white/80 backdrop-blur-xl border-b border-slate-200 px-6 md:px-12 py-5 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center space-x-3">
      <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/20">
        <span class="material-symbols-outlined text-white text-xl">school</span>
      </div>
      <div>
        <h1 class="text-xl font-extrabold tracking-tight text-slate-900 leading-none">Yachay<span class="text-indigo-600 font-light">Docente</span></h1>
        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Gestión de Notas y Alumnos</p>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 mt-12">
    <!-- Título de sección[cite: 1] -->
    <div class="mb-8">
      <h3 class="text-xs font-bold uppercase tracking-[0.3em] text-slate-400 mb-2">Panel Académico</h3>
      <h2 class="text-3xl font-black text-slate-900 tracking-tight">Resultados del Simulador</h2>
    </div>

    <!-- Indicador de Carga estilo Premium[cite: 1] -->
    <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-20">
      <span class="material-symbols-outlined animate-spin text-4xl text-indigo-500 mb-3">progress_activity</span>
      <p class="text-slate-400 font-bold uppercase tracking-widest text-[9px]">Cargando base de datos...</p>
    </div>

    <!-- Tabla con diseño de tarjetas redondeadas[cite: 1] -->
    <section *ngIf="!isLoading" class="bg-white rounded-[2.5rem] border border-slate-200 shadow-2xl shadow-slate-200/40 overflow-hidden">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50/50 border-b border-slate-100">
            <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-500">Estudiante</th>
            <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-500 text-center">Código</th>
            <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-500 text-center">Calificación</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50">
          <tr *ngFor="let alumno of alumnos" class="hover:bg-indigo-50/30 transition-all group">
            <td class="px-8 py-6">
              <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-white border-2 border-slate-100 flex items-center justify-center text-indigo-600 font-bold shadow-sm group-hover:border-indigo-200">
                  {{ getInitial(alumno.nombre) }}
                </div>
                <span class="text-sm font-bold text-slate-800">{{ alumno.nombre }}</span>
              </div>
            </td>
            <td class="px-8 py-6 text-center text-xs font-mono text-slate-500">{{ alumno.codigo }}</td>
            <td class="px-8 py-6 text-center">
              <span class="text-lg font-black" [ngClass]="alumno.nota >= 13 ? 'text-indigo-600' : 'text-rose-500'">
                {{ alumno.nota }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
</div>
