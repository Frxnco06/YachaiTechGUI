<div class="flex h-screen bg-slate-50 font-sans overflow-hidden">
  
  <aside class="hidden md:flex w-72 bg-slate-900 text-white flex-col shadow-2xl z-30">
    <div class="h-20 flex items-center px-8 border-b border-white/5">
      <h1 class="text-2xl font-black tracking-tighter text-indigo-400 font-headline italic">Yachay-Pro</h1>
    </div>
    
    <nav class="flex-grow py-8 px-4 space-y-3">
      <a routerLink="/formulario" class="flex items-center space-x-3 px-4 py-3 text-slate-400 hover:bg-white/5 hover:text-white rounded-xl transition-all duration-200 group">
        <span class="material-symbols-outlined group-hover:scale-110 transition-transform">dashboard</span>
        <span class="font-bold text-xs uppercase tracking-widest">Dashboard</span>
      </a>
      
      <a class="flex items-center space-x-3 px-4 py-3 bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 rounded-xl transition-all cursor-default">
        <span class="material-symbols-outlined">science</span>
        <span class="font-bold text-xs uppercase tracking-widest">Simulador</span>
      </a>
    </nav>

    <div class="p-6 border-t border-white/5">
      <button (click)="logout()" class="w-full flex items-center justify-center space-x-2 px-4 py-3 text-slate-500 hover:bg-red-500/10 hover:text-red-400 rounded-xl transition-colors">
        <span class="material-symbols-outlined text-xl">logout</span>
        <span class="font-bold text-xs uppercase tracking-widest">Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <main class="flex-grow flex flex-col relative overflow-y-auto">
    
    <header class="h-20 bg-white/70 backdrop-blur-md sticky top-0 border-b border-slate-200 flex items-center justify-between px-6 md:px-12 z-20">
      <div class="flex items-center space-x-4">
        <div class="flex items-center space-x-3">
          <span class="material-symbols-outlined text-slate-800 text-2xl">menu_book</span>
          <h2 class="text-lg md:text-xl font-extrabold text-slate-800 font-headline uppercase tracking-tight">Fase {{ idFase }} <span class="text-slate-300 mx-2">—</span> Lectura</h2>
        </div>
      </div>
      
      <div class="flex items-center space-x-4">
        <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center border border-slate-200 shadow-sm">
          <span class="material-symbols-outlined text-slate-600">person</span>
        </div>
      </div>
    </header>

    <div class="p-6 md:p-12 max-w-5xl mx-auto w-full animate-fade-in">

      <div *ngIf="!isLoading && fase" class="space-y-10">
        
        <div class="bg-slate-800 rounded-[2.5rem] p-8 md:p-14 text-white relative overflow-hidden shadow-2xl shadow-slate-300">
          <div class="absolute -right-10 -top-10 w-80 h-80 bg-indigo-600/10 rounded-full blur-[80px]"></div>
          
          <div class="relative z-10">
            <div class="flex items-center space-x-3 mb-6">
              <span class="bg-indigo-500/20 text-indigo-300 text-[10px] font-black uppercase tracking-[0.2em] px-4 py-1.5 rounded-lg border border-indigo-500/30">
                Fase Actual
              </span>
            </div>
            <h3 class="text-4xl md:text-6xl font-black mb-4 font-headline leading-tight tracking-tighter">{{ fase.nombre }}</h3>
            <p class="text-slate-400 text-base md:text-lg max-w-2xl">
              Analiza cuidadosamente la información antes de tomar una decisión estratégica.
            </p>
          </div>
        </div>

        <div class="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-sm border border-slate-200">
          <div class="flex items-center space-x-4 mb-10 pb-8 border-b border-slate-100">
            <div class="w-12 h-12 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center">
              <span class="material-symbols-outlined text-2xl">description</span>
            </div>
            <h4 class="text-xl font-bold text-slate-800 font-headline">Instrucciones del Caso</h4>
          </div>

          <div class="prose prose-slate max-w-none">
            <p *ngFor="let paragraph of fase.contenido.split('\n')" 
               class="text-slate-600 text-lg leading-relaxed mb-6">
              {{ paragraph }}
            </p>
          </div>
        </div>

        <div class="flex justify-end pb-16">
          <button (click)="iniciarSimulacion()"
            class="group relative bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-5 rounded-2xl font-black text-sm uppercase tracking-widest transition-all duration-300 shadow-xl shadow-indigo-200 hover:-translate-y-1 active:scale-95 flex items-center space-x-4">
            <span>Iniciar Simulación</span>
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
          </button>
        </div>

      </div>
    </div>
  </main>
</div>
