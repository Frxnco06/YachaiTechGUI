<div class="flex h-screen bg-surface font-body overflow-hidden">
  
  <!-- Sidebar -->
  <aside class="w-64 bg-primary-container text-white flex flex-col shadow-lg z-20">
    <div class="h-20 flex items-center px-6 border-b border-white/10">
      <h1 class="text-2xl font-extrabold tracking-tight text-white/90 font-headline">Yachay-Pro</h1>
    </div>
    
    <nav class="flex-grow py-6 px-4 space-y-2">
      <a routerLink="/formulario" class="flex items-center space-x-3 px-4 py-3 bg-secondary/20 text-secondary border-r-4 border-secondary rounded-l-lg transition-colors">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="font-semibold text-sm uppercase tracking-wider">Dashboard</span>
      </a>
      
      <a (click)="iniciarSimulador()" class="flex items-center space-x-3 px-4 py-3 text-white/70 hover:bg-white/5 hover:text-white rounded-lg transition-colors cursor-pointer">
        <span class="material-symbols-outlined">science</span>
        <span class="font-semibold text-sm uppercase tracking-wider">Simulador</span>
      </a>
    </nav>

    <div class="p-4 border-t border-white/10">
      <button (click)="logout()" class="w-full flex items-center justify-center space-x-2 px-4 py-3 text-white/80 hover:bg-red-500/20 hover:text-red-400 rounded-lg transition-colors">
        <span class="material-symbols-outlined">logout</span>
        <span class="font-semibold text-sm uppercase tracking-wider">Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-grow flex flex-col relative overflow-y-auto bg-surface">
    
    <!-- Topbar -->
    <header class="h-20 bg-white shadow-sm flex items-center justify-between px-8 z-10">
      <h2 class="text-xl font-bold text-primary font-headline">Resumen Ejecutivo</h2>
      
      <div class="flex items-center space-x-4">
        <div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center border border-secondary/20">
          <span class="material-symbols-outlined text-secondary">person</span>
        </div>
      </div>
    </header>

    <!-- Dashboard Content -->
    <div class="p-8 space-y-6">
      
      <!-- Welcome Card -->
      <div class="bg-primary rounded-2xl p-8 text-white relative overflow-hidden shadow-md">
        <div class="absolute right-0 top-0 w-64 h-64 bg-secondary/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/4"></div>
        <div class="relative z-10 w-full md:w-2/3">
          <h3 class="text-3xl font-extrabold mb-2 font-headline">Panel de Control</h3>
          <p class="text-white/70 text-sm leading-relaxed mb-6 font-body">Bienvenido al sistema Yachay-Pro. Utiliza el simulador para realizar tus análisis de gestión y toma de decisiones.</p>
          <button (click)="iniciarSimulador()" [disabled]="isNavigating" class="bg-secondary text-white px-6 py-2.5 rounded-lg font-bold text-sm hover:bg-secondary/90 transition-colors shadow-lg shadow-secondary/30 disabled:opacity-50">
            Iniciar Simulador
          </button>
        </div>
      </div>

    </div>
  </main>
</div>
